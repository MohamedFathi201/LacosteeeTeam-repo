car_telemetry:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('DBT_POSTGRES_HOST', 'localhost') }}"
      port: {{ env_var('DBT_POSTGRES_PORT', '5435') | int }}
      user: "{{ env_var('DBT_POSTGRES_USER', 'telemetry') }}"
      password: "{{ env_var('DBT_POSTGRES_PASSWORD', 'telemetry_secret_2024') }}"
      dbname: "{{ env_var('DBT_POSTGRES_DB', 'car_telemetry_dw') }}"
      schema: "{{ env_var('DBT_POSTGRES_SCHEMA', 'public') }}"
      threads: 4
      connect_timeout: 10
